name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run pytest -m fast
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run python scripts/repository_policy.py all --root .
